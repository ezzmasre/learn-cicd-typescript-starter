name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    # 1. Provide the secret to the job environment
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      # 2. Run database migrations before moving to GCP
      - name: Run migrations
        run: npm run db:migrate

      - name: "Authenticate to Google Cloud"
        uses: "google-github-actions/auth@v2"
        with:
          credentials_json: "${{ secrets.GCP_CREDENTIALS }}"

      - name: "Set up Cloud SDK"
        uses: "google-github-actions/setup-gcloud@v2"

      - name: "Build and Push to Artifact Registry"
        run: |
          gcloud builds submit --tag us-docker.pkg.dev/qwiklabs-gcp-00-1884b6077612/notely-ar-repo/notely:latest .

      - name: "Deploy to Cloud Run"
        run: |
          gcloud run deploy notely \
            --image us-docker.pkg.dev/qwiklabs-gcp-00-1884b6077612/notely-ar-repo/notely:latest \
            --region us-central1 \
            --allow-unauthenticated \
            --project qwiklabs-gcp-00-1884b6077612 \
            --max-instances=4
